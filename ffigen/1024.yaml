output: '../lib/src/mlkem_1024_bindings.dart'
name: 'MLKEM1024'
description: 'Holds ffigen generated implementation bindings for MLKEM1024'
headers:
  entry-points:
    - '../src/include/mlkem1024_api.h'
comments: true
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names

ffi-native:
  asset-id: 'src/mlkem1024_bindings.dart'
  enabled: true

functions:
  include:
    - 'mlkem1024.*'

# ADD THIS: This stops the flood of system typedefs
typedefs:
  include:
    - 'mlkem1024.*'  # Only include typedefs starting with mlkem1024
  exclude:
    - '.*'          # Explicitly exclude everything else just to be safe

structs:
  exclude:
    - '.*'

unions:
  exclude:
    - '.*'

# ALSO CONSIDER: If you have global variables you don't want
globals:
  exclude:
    - '.*'

macros:
  include:
    - '^MLKEM1024.*'