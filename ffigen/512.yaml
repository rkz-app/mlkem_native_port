output: '../lib/src/mlkem512_bindings.dart'
name: 'MLKEM512'
description: 'Holds ffigen generated implementation bindings for MLKEM512'
headers:
  entry-points:
    - '../src/include/mlkem512_api.h'
comments: true
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names

ffi-native:
  asset-id: 'src/mlkem512_bindings.dart'
  enabled: true

functions:
  include:
    - 'mlkem512.*'

# ADD THIS: This stops the flood of system typedefs
typedefs:
  include:
    - 'mlkem512.*'  # Only include typedefs starting with mlkem512
  exclude:
    - '.*'          # Explicitly exclude everything else just to be safe

structs:
  exclude:
    - '.*'

unions:
  exclude:
    - '.*'

# ALSO CONSIDER: If you have global variables you don't want
globals:
  exclude:
    - '.*'

macros:
  include:
    - '^MLKEM512.*'